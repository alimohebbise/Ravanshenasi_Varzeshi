<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>داشبورد مربی</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="card-title">سلام {{ request.user.username }}</h1>
          <p class="lead">شما دسترسی مربی دارید.</p>
          <ul>
            <li>مشاهده و مدیریت جلسات خود</li>
            <li>دسترسی به پروفایل مربی و اطلاعات تخصصی</li>
            <li>ارتباط با کاربران و شاگردان</li>
          </ul>
          <a href="{% url 'accounts:logout' %}" class="btn btn-outline-secondary">خروج</a>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
